<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaberAkışı – Anlık Haber Takibi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root,[data-theme="light"]{
  --bg:#f4f2ee;
  --surface:#ffffff;
  --surface2:#faf9f7;
  --offset:#edeae4;
  --offset2:#e4e1da;
  --dynamic:#d9d5cc;
  --border:#d0ccc3;
  --text:#1a1814;
  --muted:#72706b;
  --faint:#b0ada7;
  --inv:#ffffff;
  --primary:#1a6b5c;
  --primaryh:#145549;
  --phigh:#d4ede8;
  --accent:#c8490e;
  --gold:#b8860b;
  --green:#2d7a3a;
  --blue:#1a5276;
  --red:#a93226;
  --purple:#6c3483;
  --orange:#c0690c;
  --teal:#117a8b;
  --sh-sm:0 1px 4px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --sh-md:0 4px 20px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.05);
  --sh-lg:0 12px 48px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-2xl:1.5rem;--r-full:9999px;
  --ease:180ms cubic-bezier(.16,1,.3,1);
  --ease-slow:400ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#0f0e0c;
  --surface:#171614;
  --surface2:#1c1b18;
  --offset:#1e1d1a;
  --offset2:#232220;
  --dynamic:#2c2a27;
  --border:#312f2c;
  --text:#e8e5e0;
  --muted:#726f69;
  --faint:#4a4844;
  --inv:#1a1814;
  --primary:#3d9b87;
  --primaryh:#2e8270;
  --phigh:#1e2e2b;
  --accent:#e8693d;
  --gold:#d4a017;
  --green:#4a9e5c;
  --blue:#2e86c1;
  --red:#c0392b;
  --purple:#8e44ad;
  --orange:#e07b20;
  --teal:#1abc9c;
  --sh-sm:0 1px 4px rgba(0,0,0,.3);
  --sh-md:0 4px 20px rgba(0,0,0,.45);
  --sh-lg:0 12px 48px rgba(0,0,0,.6);
}

/* ============================================================
   BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth}
body{min-height:100dvh;font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);display:flex;flex-direction:column}
img{display:block;max-width:100%;object-fit:cover}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
a,button{transition:color var(--ease),background var(--ease),border-color var(--ease),opacity var(--ease),box-shadow var(--ease)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--r-sm)}

/* ============================================================
   HEADER
   ============================================================ */
.header{
  position:sticky;top:0;z-index:200;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  box-shadow:var(--sh-sm);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.header-inner{
  max-width:1360px;margin-inline:auto;
  padding:0 28px;
  height:58px;
  display:flex;align-items:center;gap:16px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Playfair Display',Georgia,serif;
  font-size:19px;font-weight:600;
  letter-spacing:-.01em;
  white-space:nowrap;
  color:var(--text);
}
.logo-mark{
  width:32px;height:32px;
  background:var(--primary);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:white;flex-shrink:0;
}
.header-divider{width:1px;height:22px;background:var(--border);margin:0 4px}
.live-pill{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:500;
  color:var(--muted);
  padding:3px 10px;
  background:var(--offset);
  border-radius:var(--r-full);
  border:1px solid var(--border);
}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.icon-btn{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);color:var(--muted);
  border:1px solid transparent;
}
.icon-btn:hover{background:var(--offset);border-color:var(--border);color:var(--text)}
.refresh-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 16px;
  background:var(--primary);color:white;
  border-radius:var(--r-md);
  font-size:12px;font-weight:600;letter-spacing:.01em;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.refresh-btn:hover{background:var(--primaryh);box-shadow:var(--sh-sm)}
.refresh-btn.spin svg{animation:rotate .75s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}

/* ============================================================
   LAYOUT
   ============================================================ */
.layout{
  display:flex;flex:1;
  max-width:1360px;margin-inline:auto;
  width:100%;padding:24px 28px;
  gap:24px;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar{
  width:210px;flex-shrink:0;
  display:flex;flex-direction:column;
  gap:24px;
}
.sidebar-label{
  font-size:10px;font-weight:700;
  color:var(--faint);
  text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:6px;padding:0 10px;
}
.nav-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;
  border-radius:var(--r-md);
  font-size:13px;color:var(--muted);
  width:100%;text-align:left;
  position:relative;
  transition:all var(--ease);
}
.nav-btn:hover{background:var(--offset);color:var(--text)}
.nav-btn.active{
  background:var(--phigh);
  color:var(--primary);
  font-weight:600;
}
.nav-btn.active::before{
  content:'';
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;
  background:var(--primary);
  border-radius:0 3px 3px 0;
}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-count{
  margin-left:auto;
  font-size:10px;font-weight:600;
  background:var(--offset2);color:var(--muted);
  padding:2px 8px;border-radius:var(--r-full);
  min-width:20px;text-align:center;
  font-variant-numeric:tabular-nums;
}
.nav-btn.active .nav-count{background:var(--primary);color:white}

.src-row{
  display:flex;align-items:center;padding:4px 10px;
  border-radius:var(--r-md);font-size:12px;color:var(--muted);
}
.src-row:hover{background:var(--offset);color:var(--text)}
.src-row label{display:flex;align-items:center;gap:8px;cursor:pointer;width:100%}
.src-row input{accent-color:var(--primary);cursor:pointer}

.auto-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;font-size:12px;color:var(--muted);
}
.toggle-switch{position:relative;width:34px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;
  background:var(--offset2);
  border-radius:var(--r-full);
  cursor:pointer;transition:background var(--ease);
  border:1px solid var(--border);
}
.toggle-switch input:checked+.toggle-track{background:var(--primary);border-color:var(--primary)}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:14px;height:14px;
  background:white;border-radius:50%;
  transition:transform var(--ease);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-switch input:checked~.toggle-thumb{transform:translateX(14px)}
.countdown{font-size:10px;color:var(--faint);padding:2px 10px}

/* ============================================================
   MAIN
   ============================================================ */
.main{flex:1;min-width:0}
.main-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;gap:12px;flex-wrap:wrap;
}
.page-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:600;
  color:var(--text);letter-spacing:-.02em;
  line-height:1.2;
}
.page-meta{font-size:11px;color:var(--muted);margin-top:3px}
.view-toggle{
  display:flex;background:var(--offset);
  border-radius:var(--r-md);padding:3px;gap:2px;
  border:1px solid var(--border);
}
.view-btn{
  width:30px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:5px;color:var(--muted);
}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--sh-sm)}

/* ============================================================
   TOOLBAR
   ============================================================ */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
.search-input{
  width:100%;
  padding:9px 14px 9px 38px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  font-size:13px;color:var(--text);
  transition:border-color var(--ease),box-shadow var(--ease);
}
.search-input::placeholder{color:var(--faint)}
.search-input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent);
}
.pills{display:flex;gap:6px}
.pill{
  padding:6px 14px;font-size:11px;font-weight:500;
  border:1px solid var(--border);border-radius:var(--r-full);
  color:var(--muted);background:var(--surface);cursor:pointer;
  transition:all var(--ease);
}
.pill:hover{border-color:var(--primary);color:var(--primary);background:var(--phigh)}
.pill.active{background:var(--primary);border-color:var(--primary);color:white;box-shadow:0 2px 6px rgba(0,0,0,.15)}

/* ============================================================
   TRENDING BAR
   ============================================================ */
.trending-bar{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:10px 16px;
  margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
  overflow:hidden;
  box-shadow:var(--sh-sm);
}
.trending-label{
  font-size:10px;font-weight:700;
  color:var(--accent);
  text-transform:uppercase;letter-spacing:.1em;
  white-space:nowrap;
  display:flex;align-items:center;gap:5px;flex-shrink:0;
}
.trend-chips{display:flex;gap:6px;overflow:hidden}
.trend-chip{
  font-size:11px;font-weight:500;
  padding:3px 11px;
  border-radius:var(--r-full);
  background:var(--offset);color:var(--muted);
  white-space:nowrap;cursor:pointer;
  border:1px solid var(--border);
  transition:all var(--ease);
}
.trend-chip:hover{background:var(--phigh);color:var(--primary);border-color:var(--primary)}

/* ============================================================
   FEATURED CARD (top story)
   ============================================================ */
.featured-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 380px;
  min-height:220px;
  margin-bottom:16px;
  box-shadow:var(--sh-md);
  animation:fadeUp .3s ease both;
  cursor:pointer;
  transition:box-shadow var(--ease),border-color var(--ease),transform var(--ease);
}
.featured-card:hover{
  box-shadow:var(--sh-lg);
  border-color:color-mix(in srgb,var(--primary) 50%,var(--border));
}
.featured-card.read .featured-body .fc-title{opacity:.5}
.featured-body{
  padding:24px 28px;
  display:flex;flex-direction:column;
  justify-content:space-between;
}
.fc-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.fc-title{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;
  line-height:1.3;
  color:var(--text);
  margin-bottom:10px;
  display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  letter-spacing:-.01em;
}
.fc-summary{
  font-size:13px;color:var(--muted);
  line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;
}
.fc-footer{display:flex;align-items:center;gap:8px;margin-top:16px}
.fc-img-wrap{overflow:hidden;position:relative}
.fc-img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.featured-card:hover .fc-img{transform:scale(1.03)}
.fc-img-placeholder{
  width:100%;height:100%;
  background:linear-gradient(135deg,var(--offset) 0%,var(--dynamic) 100%);
  display:flex;align-items:center;justify-content:center;
  color:var(--faint);
}

/* ============================================================
   FEED
   ============================================================ */
.feed{display:flex;flex-direction:column;gap:10px}
.feed.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;align-items:start}

/* ============================================================
   CARD
   ============================================================ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;
  transition:box-shadow var(--ease),border-color var(--ease);
  animation:fadeUp .25s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{
  box-shadow:var(--sh-md);
  border-color:color-mix(in srgb,var(--primary) 40%,var(--border));
}
.card.read .card-title{opacity:.45}
.card.read .card-img{opacity:.55;filter:grayscale(.3)}

/* list mode */
.feed:not(.grid) .card{display:grid;grid-template-columns:1fr auto;gap:0}
.feed:not(.grid) .card-img-wrap{
  grid-row:1/3;grid-column:2;
  width:108px;height:80px;
  border-radius:var(--r-md);overflow:hidden;
  align-self:center;margin:12px 12px 12px 0;
}
.feed:not(.grid) .card-body{padding:12px 0 5px 14px;grid-column:1}
.feed:not(.grid) .card-footer{padding:0 0 12px 14px;grid-column:1;display:flex;align-items:center;gap:8px}

/* grid mode */
.feed.grid .card{display:flex;flex-direction:column}
.feed.grid .card-img-wrap{width:100%;height:170px;overflow:hidden;flex-shrink:0}
.feed.grid .card-body{padding:14px 16px 8px;flex:1}
.feed.grid .card-footer{padding:0 16px 14px;display:flex;align-items:center;gap:8px}

.card-img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.card:hover .card-img{transform:scale(1.05)}
.card-img-placeholder{
  width:100%;height:100%;
  background:linear-gradient(135deg,var(--offset) 0%,var(--dynamic) 100%);
  display:flex;align-items:center;justify-content:center;color:var(--faint);
}
.card-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:7px}
.cat-badge{
  padding:2px 8px;border-radius:var(--r-full);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:white;flex-shrink:0;
}
.new-badge{
  padding:2px 8px;border-radius:var(--r-full);
  font-size:10px;font-weight:700;
  background:var(--accent);color:white;letter-spacing:.03em;flex-shrink:0;
}
.card-title{
  font-size:14px;font-weight:600;line-height:1.4;
  color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:5px;
}
.feed.grid .card-title{font-size:15px}
.card-summary{
  font-size:12px;color:var(--muted);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-source{
  font-size:11px;color:var(--faint);
  display:flex;align-items:center;gap:4px;
  flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.card-actions{display:flex;gap:2px;flex-shrink:0}
.act-btn{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);color:var(--faint);
  transition:all var(--ease);
}
.act-btn:hover{background:var(--offset);color:var(--primary)}
.act-btn.bookmarked{color:var(--gold)}
.act-btn.bookmarked:hover{background:color-mix(in srgb,var(--gold) 14%,var(--offset))}

/* ============================================================
   EMPTY / ERROR
   ============================================================ */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  padding:80px 32px;color:var(--muted);gap:14px;
}
.empty svg{color:var(--faint);opacity:.4}
.empty h3{font-size:16px;color:var(--text);font-family:'Playfair Display',serif}
.empty p{font-size:13px;max-width:30ch;line-height:1.6}
.error-state{
  background:color-mix(in srgb,var(--red) 8%,var(--surface));
  border:1px solid color-mix(in srgb,var(--red) 28%,var(--border));
  border-radius:var(--r-lg);padding:24px 28px;text-align:center;
}
.error-state strong{color:var(--red);display:block;margin-bottom:8px;font-size:16px}
.error-state p{font-size:13px;color:var(--muted);line-height:1.6}

/* ============================================================
   SKELETON
   ============================================================ */
@keyframes shim{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk{
  background:linear-gradient(90deg,var(--offset) 25%,var(--dynamic) 50%,var(--offset) 75%);
  background-size:200%;animation:shim 1.5s ease-in-out infinite;
  border-radius:var(--r-sm);
}
.sk-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px;
  display:flex;gap:14px;
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  z-index:500;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-2xl);padding:28px;
  width:460px;max-width:calc(100vw - 40px);
  box-shadow:var(--sh-lg);
  transform:translateY(16px) scale(.96);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.open .modal{transform:none}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.modal-header svg{color:var(--primary)}
.modal h3{font-size:17px;font-weight:700;font-family:'Playfair Display',serif}
.modal p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.modal code{background:var(--offset2);padding:2px 7px;border-radius:4px;font-size:11px;word-break:break-all}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.03em}
.field input{
  padding:10px 14px;background:var(--offset);
  border:1px solid var(--border);border-radius:var(--r-md);
  font:inherit;font-size:13px;color:var(--text);
  transition:border-color var(--ease),box-shadow var(--ease);
}
.field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}
.btn-sec{padding:8px 18px;font-size:13px;border:1px solid var(--border);border-radius:var(--r-md);color:var(--muted);font-weight:500}
.btn-sec:hover{background:var(--offset)}
.btn-prim{
  padding:8px 18px;font-size:13px;
  background:var(--primary);color:white;
  border-radius:var(--r-md);font-weight:600;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}
.btn-prim:hover{background:var(--primaryh)}

/* ============================================================
   TOAST
   ============================================================ */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:11px 18px;
  font-size:12px;font-weight:500;color:var(--muted);
  box-shadow:var(--sh-lg);
  display:flex;align-items:center;gap:9px;
  opacity:0;transform:translateY(12px);
  transition:all .3s cubic-bezier(.16,1,.3,1);
  pointer-events:none;z-index:300;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok svg{color:var(--green)}
.toast.err svg{color:var(--red)}

/* ============================================================
   STATS ROW
   ============================================================ */
.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:16px;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--sh-sm);
}
.stat-icon{
  width:34px;height:34px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:white;
}
.stat-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}

/* ============================================================
   MOBILE
   ============================================================ */
@media(max-width:900px){
  .layout{flex-direction:column;padding:12px 14px;gap:14px}
  .sidebar{width:100%}
  .nav-btns-wrap{display:flex;flex-wrap:wrap;gap:4px}
  .nav-btn{width:auto;padding:5px 10px;font-size:12px}
  .nav-btn.active::before{display:none}
  .src-section,.bottom-section{display:none}
  .header-inner{padding:0 16px}
  .live-pill,.header-divider{display:none}
  .featured-card{grid-template-columns:1fr;min-height:auto}
  .fc-img-wrap{height:180px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .stats-row{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
      </div>
      HaberAkışı
    </div>
    <div class="header-divider"></div>
    <div class="live-pill"><span class="live-dot"></span>Canlı Takip</div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Yenile
      </button>
      <button class="icon-btn" onclick="openSetup()" title="API Ayarla" aria-label="API Ayarla">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" title="Tema Değiştir" aria-label="Tema">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-label">Kategoriler</div>
      <div class="nav-btns-wrap" id="catNav"></div>
    </div>
    <div class="src-section">
      <div class="sidebar-label">Kaynaklar</div>
      <div id="srcList"></div>
    </div>
    <div class="bottom-section">
      <div class="sidebar-label">Koleksiyon</div>
      <button class="nav-btn" id="savedBtn" onclick="showSaved()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        Kaydedilenler
        <span class="nav-count" id="savedCnt">0</span>
      </button>
      <div class="sidebar-label" style="margin-top:18px">Oto-Yenileme</div>
      <div class="auto-row">
        <span>Her 5 dakika</span>
        <label class="toggle-switch">
          <input type="checkbox" id="autoTgl" checked onchange="toggleAuto(this.checked)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="countdown" id="countdown">–</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-icon" style="background:var(--primary)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg></div><div><div class="stat-val" id="s-total">–</div><div class="stat-lbl">Toplam Haber</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--accent)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div><div class="stat-val" id="s-new">–</div><div class="stat-lbl">Son 1 Saat</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--blue)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div><div><div class="stat-val" id="s-src">–</div><div class="stat-lbl">Kaynak</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--gold)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg></div><div><div class="stat-val" id="s-saved">0</div><div class="stat-lbl">Kaydedilen</div></div></div>
    </div>

    <!-- Top -->
    <div class="main-top">
      <div>
        <div class="page-title" id="pageTitle">Tüm Haberler</div>
        <div class="page-meta" id="pageMeta">API URL giriniz…</div>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('list',this)" title="Liste">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="view-btn" onclick="setView('grid',this)" title="Grid">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
      </div>
    </div>

    <!-- Trending -->
    <div class="trending-bar">
      <div class="trending-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Trend
      </div>
      <div class="trend-chips" id="trendChips"></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" id="searchIn" placeholder="Haberlerde ara…" oninput="onSearch(this.value)">
      </div>
      <div class="pills">
        <button class="pill active" onclick="setSort('newest',this)">En Yeni</button>
        <button class="pill" onclick="setSort('oldest',this)">En Eski</button>
      </div>
    </div>

    <!-- Featured -->
    <div id="featuredWrap"></div>

    <!-- Feed -->
    <div class="feed" id="feed"></div>
  </main>
</div>

<!-- SETUP MODAL -->
<div class="modal-overlay" id="setupModal" onclick="closeSetup(event)">
  <div class="modal">
    <div class="modal-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      <h3>API Bağlantısı</h3>
    </div>
    <p>
      Google Apps Script üzerinden deploy ettiğin API URL'ini gir.<br>
      <code>https://script.google.com/macros/s/AKf.../exec</code>
    </p>
    <div class="field">
      <label>API URL</label>
      <input id="apiUrlInput" type="url" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeSetup()">İptal</button>
      <button class="btn-prim" onclick="saveApiUrl()">Bağlan</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
  <span id="toastMsg"></span>
</div>

<script>
/* ===== THEME ===== */
(()=>{
  const btn=document.getElementById('themeBtn'),r=document.documentElement;
  let t=localStorage.getItem('ha_theme')||'dark';
  r.setAttribute('data-theme',t);
  const moon='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  const sun='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  const update=()=>btn.innerHTML=t==='dark'?moon:sun;
  update();
  btn.onclick=()=>{t=t==='dark'?'light':'dark';r.setAttribute('data-theme',t);localStorage.setItem('ha_theme',t);update();};
})();

/* ===== CONFIG ===== */
const CATS=[
  {id:'all',    label:'Tümü',      color:'#6b7280'},
  {id:'gundem', label:'Gündem',    color:'#c0392b'},
  {id:'ekonomi',label:'Ekonomi',  color:'#b8860b'},
  {id:'spor',   label:'Spor',     color:'#2d7a3a'},
  {id:'teknoloji',label:'Teknoloji',color:'#1a5276'},
  {id:'dunya',  label:'Dünya',    color:'#6c3483'},
  {id:'saglik', label:'Sağlık',   color:'#117a8b'},
  {id:'magazin',label:'Magazin',  color:'#c0690c'},
];

let articles=[],saved=new Set(),read=new Set();
let activeCat='all',activeSort='newest',searchQ='',viewMode='list';
let enabledSrc=new Set();
let autoTimer=null,nextAt=null;
let API_URL=localStorage.getItem('ha_apiUrl')||'https://script.google.com/macros/s/AKfycbyqOlHl1ikiC_fdMUFqhxVkqjgGC5dJ0OU0Porkyq5fcErZQVd3ihsyPW7mc8Sn0xe4/exec';

/* ===== BOOT ===== */
function boot(){
  renderCatNav();
  if(!API_URL){showNoApi();openSetup();}else{localStorage.setItem('ha_apiUrl',API_URL);}
  else{showSkeletons();loadData();startAuto();}
}

function showNoApi(){
  document.getElementById('feed').innerHTML=`<div class="error-state">
    <strong>⚙️ API Bağlantısı Yok</strong>
    <p>Sağ üstteki 📡 ikona tıklayıp Google Apps Script URL'ini gir.</p>
  </div>`;
  document.getElementById('pageMeta').textContent='API URL bekleniyor…';
}

/* ===== CAT NAV ===== */
function renderCatNav(){
  document.getElementById('catNav').innerHTML=CATS.map(c=>`
    <button class="nav-btn${c.id==='all'?' active':''}" data-cat="${c.id}" onclick="setCat('${c.id}',this)">
      <span class="nav-dot" style="background:${c.color}"></span>${c.label}
      <span class="nav-count" id="cnt_${c.id}">–</span>
    </button>`).join('');
}
function setCat(id,el){
  activeCat=id;
  document.querySelectorAll('.nav-btn[data-cat]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const c=CATS.find(x=>x.id===id);
  document.getElementById('pageTitle').textContent=c.id==='all'?'Tüm Haberler':c.label+' Haberleri';
  renderFeed();
}

/* ===== SRC LIST ===== */
function buildSrcList(){
  enabledSrc=new Set(articles.map(a=>a.source));
  const sources=[...new Set(articles.map(a=>a.source))].sort();
  document.getElementById('srcList').innerHTML=sources.map(s=>`
    <div class="src-row">
      <label><input type="checkbox" checked onchange="toggleSrc('${s}',this.checked)">${s}</label>
    </div>`).join('');
}
function toggleSrc(id,on){on?enabledSrc.add(id):enabledSrc.delete(id);renderFeed();}

/* ===== LOAD ===== */
async function loadData(){
  if(!API_URL){showNoApi();return;}
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spin');
  try{
    const res=await fetch(API_URL+'?t='+Date.now(),{signal:AbortSignal.timeout(25000)});
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'API hatası');
    articles=data.articles||[];
    buildSrcList();
    updateCounts();
    buildTrending();
    updateStats();
    renderFeed();
    const now=new Date();
    document.getElementById('pageMeta').textContent=`Son güncelleme: ${now.toLocaleTimeString('tr-TR')} · ${articles.length} haber`;
    toast(`${articles.length} haber yüklendi`,'ok');
  }catch(err){
    document.getElementById('feed').innerHTML=`<div class="error-state">
      <strong>Haberler yüklenemedi</strong>
      <p>${err.message}<br><br>API URL'ini kontrol et veya tekrar dene.</p>
    </div>`;
    document.getElementById('pageMeta').textContent='Yükleme hatası';
    toast('Hata: '+err.message,'err');
  }
  btn.classList.remove('spin');
}

/* ===== STATS ===== */
function updateStats(){
  document.getElementById('s-total').textContent=articles.length;
  document.getElementById('s-new').textContent=articles.filter(a=>a.date&&(Date.now()-a.date)<3600000).length;
  document.getElementById('s-src').textContent=new Set(articles.map(a=>a.source)).size;
}
function updateSavedStat(){document.getElementById('s-saved').textContent=saved.size;}

/* ===== COUNTS ===== */
function updateCounts(){
  CATS.forEach(c=>{
    const el=document.getElementById('cnt_'+c.id);
    if(!el)return;
    el.textContent=c.id==='all'?articles.length:articles.filter(a=>a.cat===c.id).length;
  });
}

/* ===== TRENDING ===== */
function buildTrending(){
  const words={};
  const stop=new Set(['bir','bu','da','de','ile','için','ve','ama','ya','ki','ne','en','daha','olan','gibi','kadar','sonra','önce','yeni','son','büyük','çok','oldu','var','mı','mi','mu','mü']);
  articles.forEach(a=>{
    a.title.toLowerCase().split(/\s+/).forEach(w=>{
      w=w.replace(/[^a-züğışçö]/gi,'');
      if(w.length>3&&!stop.has(w))words[w]=(words[w]||0)+1;
    });
  });
  const top=Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([w])=>w);
  document.getElementById('trendChips').innerHTML=top.map(w=>`<span class="trend-chip" onclick="quickSearch('${w}')">${w}</span>`).join('');
}
function quickSearch(q){document.getElementById('searchIn').value=q;onSearch(q);}

/* ===== RENDER ===== */
function filtered(){
  let arr=articles.filter(a=>enabledSrc.has(a.source));
  if(activeCat!=='all')arr=arr.filter(a=>a.cat===activeCat);
  if(searchQ){const q=searchQ.toLowerCase();arr=arr.filter(a=>a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)||a.source.toLowerCase().includes(q));}
  if(activeSort==='oldest')arr=[...arr].reverse();
  return arr;
}

function renderFeed(){
  const arr=filtered();
  const feed=document.getElementById('feed');
  const fw=document.getElementById('featuredWrap');
  feed.className='feed'+(viewMode==='grid'?' grid':'');

  if(!arr.length){
    fw.innerHTML='';
    feed.innerHTML=`<div class="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <h3>${searchQ?'Sonuç bulunamadı':'Haber bulunamadı'}</h3>
      <p>${searchQ?'"'+ esc(searchQ) +'" için haber yok.':(activeCat==='all'?'Haberler yükleniyor…':'Bu kategoride haber bulunmuyor.')}</p>
    </div>`;
    return;
  }

  // Featured = first article (only in list mode, no search)
  let feedArr=arr;
  if(viewMode==='list'&&!searchQ&&activeCat!=='saved'){
    const feat=arr[0];
    fw.innerHTML=featuredHtml(feat);
    feedArr=arr.slice(1);
  }else{
    fw.innerHTML='';
  }

  document.getElementById('pageMeta').textContent=`${arr.length} haber`;
  feed.innerHTML=feedArr.map((a,i)=>cardHtml(a,i)).join('');
}

/* ===== FEATURED ===== */
function featuredHtml(a){
  const cat=CATS.find(c=>c.id===a.cat)||CATS[1];
  const bk=saved.has(a.id);
  const rd=read.has(a.id);
  const imgHtml=a.img
    ?`<img class="fc-img" src="${esc(a.img)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=fc-img-placeholder><svg width=44 height=44 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'">`
    :`<div class="fc-img-placeholder"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  return `<div class="featured-card${rd?' read':''}" style="animation-delay:0s">
    <div class="featured-body">
      <div>
        <div class="fc-meta">
          <span class="cat-badge" style="background:${cat.color}">${cat.label}</span>
          <span style="font-size:11px;color:var(--muted)">${esc(a.source)} · ${timeAgo(a.date)}</span>
        </div>
        <h2 class="fc-title"><a href="${esc(a.link)}" target="_blank" rel="noopener" onclick="markRead('${a.id}')">${esc(a.title)}</a></h2>
        <p class="fc-summary">${esc(a.summary)}</p>
      </div>
      <div class="fc-footer">
        <button class="act-btn${bk?' bookmarked':''}" onclick="toggleSave('${a.id}')" style="width:32px;height:32px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="${bk?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        </button>
        <a class="act-btn" href="${esc(a.link)}" target="_blank" rel="noopener" onclick="markRead('${a.id}')" style="width:32px;height:32px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
    <div class="fc-img-wrap">${imgHtml}</div>
  </div>`;
}

/* ===== CARD ===== */
function cardHtml(a,i){
  const cat=CATS.find(c=>c.id===a.cat)||CATS[1];
  const isNew=a.date&&(Date.now()-a.date)<3600000;
  const bk=saved.has(a.id);
  const rd=read.has(a.id);
  const delay=Math.min(i*0.035,0.5);
  const imgHtml=a.img
    ?`<img class="card-img" src="${esc(a.img)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-placeholder><svg width=26 height=26 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.2\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'">`
    :`<div class="card-img-placeholder"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  return `<article class="card${rd?' read':''}" style="animation-delay:${delay}s">
    <div class="card-img-wrap">${imgHtml}</div>
    <div class="card-body">
      <div class="card-meta">
        <span class="cat-badge" style="background:${cat.color}">${cat.label}</span>
        ${isNew?'<span class="new-badge">YENİ</span>':''}
        <span>${timeAgo(a.date)}</span>
      </div>
      <h2 class="card-title"><a href="${esc(a.link)}" target="_blank" rel="noopener" onclick="markRead('${a.id}')">${esc(a.title)}</a></h2>
      ${a.summary?`<p class="card-summary">${esc(a.summary)}</p>`:''}
    </div>
    <div class="card-footer">
      <span class="card-source">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        ${esc(a.source)}
      </span>
      <div class="card-actions">
        <button class="act-btn${bk?' bookmarked':''}" onclick="toggleSave('${a.id}')" title="${bk?'Kaydı kaldır':'Kaydet'}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="${bk?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        </button>
        <a class="act-btn" href="${esc(a.link)}" target="_blank" rel="noopener" onclick="markRead('${a.id}')" title="Haberi aç">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  </article>`;
}

/* ===== INTERACTIONS ===== */
function markRead(id){read.add(id);setTimeout(renderFeed,120);}
function toggleSave(id){
  if(saved.has(id)){saved.delete(id);toast('Kayıt kaldırıldı','ok');}
  else{saved.add(id);toast('Haber kaydedildi','ok');}
  document.getElementById('savedCnt').textContent=saved.size;
  updateSavedStat();renderFeed();
}
function showSaved(){
  document.querySelectorAll('.nav-btn[data-cat]').forEach(b=>b.classList.remove('active'));
  document.getElementById('savedBtn').classList.add('active');
  document.getElementById('pageTitle').textContent='Kaydedilenler';
  activeCat='saved';
  const arr=articles.filter(a=>saved.has(a.id));
  const feed=document.getElementById('feed');
  document.getElementById('featuredWrap').innerHTML='';
  feed.className='feed'+(viewMode==='grid'?' grid':'');
  feed.innerHTML=arr.length?arr.map((a,i)=>cardHtml(a,i)).join(''):`<div class="empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg><h3>Henüz kayıtlı haber yok</h3><p>Yer imi simgesine tıklayarak haber kaydedin.</p></div>`;
}

/* ===== VIEW/SORT/SEARCH ===== */
function setView(v,el){viewMode=v;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderFeed();}
function setSort(s,el){activeSort=s;document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderFeed();}
function onSearch(v){searchQ=v;renderFeed();}

/* ===== API MODAL ===== */
function openSetup(){document.getElementById('apiUrlInput').value=API_URL||'';document.getElementById('setupModal').classList.add('open');}
function closeSetup(e){if(!e||e.target===document.getElementById('setupModal'))document.getElementById('setupModal').classList.remove('open');}
function saveApiUrl(){
  const v=document.getElementById('apiUrlInput').value.trim();
  if(!v||!v.startsWith('http')){toast('Geçerli bir URL gir','err');return;}
  API_URL=v;localStorage.setItem('ha_apiUrl',v);
  closeSetup();toast('Bağlantı kaydedildi, yükleniyor…','ok');
  showSkeletons();loadData();startAuto();
}

/* ===== AUTO REFRESH ===== */
function startAuto(){clearInterval(autoTimer);nextAt=Date.now()+300000;autoTimer=setInterval(()=>{doRefresh();nextAt=Date.now()+300000;},300000);setInterval(updateCountdown,10000);updateCountdown();}
function toggleAuto(on){if(on)startAuto();else{clearInterval(autoTimer);autoTimer=null;nextAt=null;document.getElementById('countdown').textContent='Kapalı';}}
function updateCountdown(){const el=document.getElementById('countdown');if(!nextAt||!document.getElementById('autoTgl').checked){el.textContent='Kapalı';return;}const s=Math.max(0,Math.round((nextAt-Date.now())/1000));el.textContent=`Sonraki: ${Math.floor(s/60)}d ${s%60}s`;}
function doRefresh(){showSkeletons();loadData();}

/* ===== SKELETONS ===== */
function showSkeletons(){
  document.getElementById('featuredWrap').innerHTML='';
  const feed=document.getElementById('feed');
  feed.className='feed';
  feed.innerHTML=Array(6).fill(0).map(()=>`
    <div class="sk-card">
      <div style="flex:1;display:flex;flex-direction:column;gap:9px;padding:2px 0">
        <div class="sk" style="height:12px;width:38%"></div>
        <div class="sk" style="height:18px;width:88%"></div>
        <div class="sk" style="height:18px;width:64%"></div>
        <div class="sk" style="height:12px;width:100%"></div>
        <div class="sk" style="height:12px;width:72%"></div>
      </div>
      <div class="sk" style="width:108px;height:80px;border-radius:10px;flex-shrink:0;align-self:center"></div>
    </div>`).join('');
}

/* ===== TOAST ===== */
let toastTm;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  el.className='toast show '+type;
  clearTimeout(toastTm);
  toastTm=setTimeout(()=>el.classList.remove('show'),3000);
}

/* ===== UTILS ===== */
function timeAgo(ms){
  if(!ms)return'';
  const m=Math.floor((Date.now()-ms)/60000);
  if(m<1)return'Az önce';if(m<60)return m+'dk önce';
  const h=Math.floor(m/60);if(h<24)return h+'sa önce';
  return Math.floor(h/24)+'g önce';
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

boot();
</script>
</body>
</html>
